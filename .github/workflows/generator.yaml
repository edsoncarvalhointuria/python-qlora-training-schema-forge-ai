
name: Gerados de Schemas Zod

on:
  schedule:
    - cron: '0 8 * * *'

  workflow_dispatch:

jobs:
  generator:
    permissions:  
      contents: write

    runs-on: ubuntu-latest

    steps:
      - name: Clonar Repositório
        uses: actions/checkout@v4

      - name: Config Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalando google
        run: pip install -U google-genai python-dotenv

      - name: Rodando Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} # Puxa do "Cofre" do GitHub!
        run: python handler.py

      - name: Config User
        run: |
          git config user.name "robô"
          git config user.email "robo@robo.com"
        
      - name: adicionando no git
        run: |
          git add .
          git commit -m "tarefa da madrugada concluida"
          git push
